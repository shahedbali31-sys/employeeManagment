<div class="card">
  <h2>Employee List</h2>

  <div class="search-bar">
    <span>🔍</span>
    <input type="text" placeholder="Search by name..." [value]="searchText" (input)="searchText = $event.target.value">
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Department</th>
        <th>Salary</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      @for (employee of filteredEmployees; track employee.id) {
        <tr>
          <td>{{ employee.id }}</td>
          <td>{{ employee.name }}</td>
          <td>{{ employee.department }}</td>
          <td>{{ employee.salary }}</td>
          <td>
            <button class="delete-btn" (click)="deleteEmployee(employee.id)">
              🗑 Delete
            </button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="5">No employees found.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
