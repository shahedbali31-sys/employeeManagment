<div class="card">
  <h2>Add Employee</h2>

  <form #employeeForm (submit)="addEmployee()" novalidate>
    <div class="form-row">

      <div class="form-group">
        <label>Name</label>
        <input type="text" placeholder="Enter name" name="name" ngModel>
      </div>

      <div class="form-group">
        <label>Department</label>
        <input type="text" placeholder="Enter department" name="department" ngModel>
      </div>

      <div class="form-group">
        <label>Salary</label>
        <input type="number" placeholder="Enter salary (number)" name="salary" ngModel>
      </div>

      <button type="submit" [disabled]="employeeForm['invalid']">+</button>

    </div>
  </form>
</div>
